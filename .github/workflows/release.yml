name: Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - custom_components/mesh_solar/manifest.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read manifest version
        id: manifest
        shell: bash
        run: |
          version="$(python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(
              Path("custom_components/mesh_solar/manifest.json").read_text(encoding="utf-8")
          )
          print(manifest["version"])
          PY
          )"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::manifest.json version '$version' is not a valid release version"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check existing tag
        id: tag
        shell: bash
        run: |
          git fetch --tags --force

          version="${{ steps.manifest.outputs.version }}"
          if git rev-parse --verify --quiet "refs/tags/$version"; then
            tagged_commit="$(git rev-list -n 1 "$version")"
            if [[ "$tagged_commit" != "$GITHUB_SHA" ]]; then
              echo "::error::Tag '$version' already exists on commit '$tagged_commit'"
              exit 1
            fi

            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Create release for manifest version
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${{ steps.manifest.outputs.version }}"

          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release '$version' already exists."
            exit 0
          fi

          gh release create "$version" \
            --target "$GITHUB_SHA" \
            --title "$version" \
            --notes "Release $version"
